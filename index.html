<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Permit Management System</title>
    <meta name="description" content="Permit Management System" />
    <style>
      /* Aggressive watermark and overlay removal */
      [class*="watermark"],
      [class*="bolt"],
      [class*="Bolt"],
      [id*="watermark"],
      [id*="bolt"],
      [id*="Bolt"],
      [class*="branding"],
      [class*="badge"],
      [class*="overlay"],
      [data-testid*="watermark"],
      [aria-label*="watermark"],
      [aria-label*="bolt"],
      [aria-label*="Bolt"],
      [class*="splash"],
      [id*="splash"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
      }

      /* Hide all fixed/absolute positioned divs that aren't part of the app */
      body > div:not(#root) {
        display: none !important;
      }

      /* Ensure root is visible and takes full space */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
      }
    </style>
    <script>
      // Ultra-aggressive watermark and overlay removal
      (function() {
        function removeUnwantedElements() {
          // Remove any element that contains bolt text
          const allElements = document.querySelectorAll('*');
          allElements.forEach(el => {
            const text = el.textContent?.toLowerCase() || '';
            const html = el.innerHTML?.toLowerCase() || '';
            if ((text.includes('bolt') || html.includes('bolt')) &&
                !el.closest('#root') &&
                el.id !== 'root') {
              el.remove();
            }
          });

          // Remove all body children except root and scripts
          const body = document.body;
          if (body) {
            Array.from(body.children).forEach(child => {
              if (child.id !== 'root' && child.tagName !== 'SCRIPT') {
                child.remove();
              }
            });
          }

          // Remove iframe overlays
          const iframes = document.querySelectorAll('iframe:not(#root iframe)');
          iframes.forEach(iframe => {
            const src = iframe.src?.toLowerCase() || '';
            if (src.includes('bolt') || !iframe.closest('#root')) {
              iframe.remove();
            }
          });
        }

        // Run immediately and continuously
        removeUnwantedElements();

        // Run every 100ms for first 10 seconds
        const interval = setInterval(removeUnwantedElements, 100);
        setTimeout(() => clearInterval(interval), 10000);

        // Continue checking periodically after that
        setInterval(removeUnwantedElements, 1000);

        // Observe for any new elements
        const observer = new MutationObserver(removeUnwantedElements);
        const startObserver = () => {
          if (document.body) {
            observer.observe(document.body, {
              childList: true,
              subtree: true,
              attributes: true,
              attributeFilter: ['class', 'id', 'style']
            });
          } else {
            setTimeout(startObserver, 10);
          }
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => {
            removeUnwantedElements();
            startObserver();
          });
        } else {
          removeUnwantedElements();
          startObserver();
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
